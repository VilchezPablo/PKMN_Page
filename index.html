<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Competitivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Pokémon Competitivo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#formatos">Formatos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#estrategias">Estrategias</a></li>
                    <li class="nav-item"><a class="nav-link" href="#equipos">Equipos</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Carrusel -->
    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner text-center">
            <div class="carousel-item active">
                <img src="img/smogon.png" class="d-block" alt="Competitivo Pokémon">
            </div>
            <div class="carousel-item">
                <img src="img/pkmnstrat.jpg" class="d-block" alt="Estrategias de batalla">
            </div>
            <div class="carousel-item">
                <img src="img/compteamimg.png" class="d-block" alt="Construcción de equipos">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
    
    <!-- Sección de Introducción -->
    <section class="container text-center my-5">
        <h1>Bienvenido al Mundo Competitivo de Pokémon</h1>
        <p class="lead">Descubre estrategias, equipos y todo lo que necesitas para dominar el metajuego.</p>
        <a href="#formatos" class="btn btn-primary btn-lg">Explorar</a>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
